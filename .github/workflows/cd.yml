name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: rust
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          skip-github-release: true
      - name: Tag pending release PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list \
            --repo ${{ github.repository }} \
            --state merged \
            --label "autorelease: pending" \
            --json number,title,mergeCommit \
            --limit 1 \
            --jq '.[0]')

          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No pending release PRs"
            exit 0
          fi

          NUMBER=$(echo "$PR" | jq -r '.number')
          TITLE=$(echo "$PR" | jq -r '.title')
          SHA=$(echo "$PR" | jq -r '.mergeCommit.oid')
          VERSION=$(echo "$TITLE" | grep -oP '\d+\.\d+\.\d+')
          TAG="v${VERSION}"

          echo "Tagging PR #${NUMBER} as ${TAG} at ${SHA}"
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            --field ref="refs/tags/${TAG}" \
            --field sha="${SHA}"

          gh api repos/${{ github.repository }}/issues/${NUMBER}/labels \
            --method DELETE \
            --field name="autorelease: pending" 2>/dev/null || true
          gh api repos/${{ github.repository }}/issues/${NUMBER}/labels \
            --method POST \
            --field labels[]="autorelease: tagged"

          gh workflow run release.yml \
            --repo ${{ github.repository }} \
            --ref main \
            --field tag="${TAG}"
